<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ふたり財布</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Couple Budget</p>
          <h1>ふたり財布</h1>
        </div>
        <button class="icon-button" id="resetButton" type="button" aria-label="リセット" title="リセット">
          ↺
        </button>
      </header>

      <section class="summary-band" aria-label="今月の残高">
        <div class="main-balance">
          <span>共有財布</span>
          <strong id="sharedBalance">0円</strong>
          <small>1日あたり <b id="dailyBudget">0円</b></small>
        </div>
        <div class="mini-balances">
          <article>
            <span>わたし</span>
            <strong id="myBalance">0円</strong>
          </article>
          <article>
            <span>パートナー</span>
            <strong id="partnerBalance">0円</strong>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>今月の設定</h2>
          <span id="monthLabel"></span>
        </div>
        <form class="setup-grid" id="setupForm">
          <label>
            <span>わたしの収入</span>
            <input id="myIncome" inputmode="numeric" pattern="[0-9]*" placeholder="例 250000" />
          </label>
          <label>
            <span>パートナーの収入</span>
            <input id="partnerIncome" inputmode="numeric" pattern="[0-9]*" placeholder="例 250000" />
          </label>
          <label>
            <span>わたしが共有財布へ</span>
            <input id="myShared" inputmode="numeric" pattern="[0-9]*" placeholder="例 90000" />
          </label>
          <label>
            <span>パートナーが共有財布へ</span>
            <input id="partnerShared" inputmode="numeric" pattern="[0-9]*" placeholder="例 90000" />
          </label>
        </form>
      </section>

      <section class="quick-entry">
        <div class="section-title">
          <h2>支出を入力</h2>
          <span>例: セブン 240円</span>
        </div>
        <form id="expenseForm" class="expense-form">
          <input id="expenseText" autocomplete="off" placeholder="セブン 240円" />
          <button type="submit">追加</button>
        </form>
        <div class="prediction" id="prediction">入力すると自動で分類します</div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>カテゴリ別</h2>
          <span id="spentTotal">0円 使用</span>
        </div>
        <div class="category-list" id="categoryList"></div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>履歴</h2>
          <button class="text-button" id="clearExpensesButton" type="button">履歴を消す</button>
        </div>
        <div class="expense-list" id="expenseList"></div>
      </section>
    </main>

    <template id="expenseItemTemplate">
      <article class="expense-item">
        <div>
          <strong class="expense-title"></strong>
          <span class="expense-meta"></span>
        </div>
        <div class="expense-side">
          <b class="expense-amount"></b>
          <button class="delete-button" type="button" aria-label="削除" title="削除">×</button>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
