<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>ふたり財布</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">Couple Budget</p>
          <h1>ふたり財布</h1>
        </div>
        <div class="top-actions">
          <button class="icon-button" id="resetButton" type="button" aria-label="リセット" title="リセット">
            ↺
          </button>
          <button
            class="icon-button"
            id="menuButton"
            type="button"
            aria-label="メニュー"
            aria-expanded="false"
            title="メニュー"
          >
            ⋯
          </button>
          <div class="menu-popover" id="mainMenu" hidden>
            <button id="settingsOpenButton" type="button">設定</button>
            <button id="themeOpenButton" type="button">テーマカラー</button>
            <button id="backupOpenButton" type="button">バックアップ</button>
          </div>
        </div>
      </header>

      <section class="summary-band" aria-label="今月の残高">
        <div class="main-balance">
          <span>共有財布</span>
          <strong id="sharedBalance">0円</strong>
          <small>1日あたり <b id="dailyBudget">0円</b></small>
        </div>
        <div class="mini-balances">
          <article>
            <span id="myBalanceName">自分</span>
            <strong id="myBalance">0円</strong>
          </article>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>今月の予算</h2>
          <div class="month-switch" aria-label="月切り替え">
            <button id="prevMonthButton" type="button" aria-label="前の月">‹</button>
            <button class="month-label-button" id="monthListButton" type="button" aria-expanded="false"></button>
            <button id="nextMonthButton" type="button" aria-label="次の月">›</button>
            <div class="month-list-popover" id="monthList" hidden></div>
          </div>
        </div>
        <form class="setup-grid" id="setupForm">
          <label>
            <span id="myIncomeText">自分の収入</span>
            <input id="myIncome" inputmode="numeric" pattern="[0-9]*" placeholder="例 250000" />
          </label>
          <label class="private-field" id="partnerIncomeField" hidden>
            <span id="partnerIncomeText">パートナーの収入</span>
            <input id="partnerIncome" inputmode="numeric" pattern="[0-9]*" placeholder="例 250000" />
          </label>
          <label>
            <span id="mySharedText">自分が共有財布へ</span>
            <input id="myShared" inputmode="numeric" pattern="[0-9]*" placeholder="例 90000" />
          </label>
          <label>
            <span id="partnerSharedText">パートナーが共有財布へ</span>
            <input id="partnerShared" inputmode="numeric" pattern="[0-9]*" placeholder="例 90000" />
          </label>
        </form>
      </section>

      <section class="quick-entry">
        <div class="section-title">
          <h2>支出を入力</h2>
        </div>
        <div class="wallet-selector" aria-label="支払い元">
          <button class="wallet-option is-active" type="button" data-wallet="shared">共有財布</button>
          <button class="wallet-option" type="button" data-wallet="me">自分</button>
          <button class="wallet-option private-field" type="button" data-wallet="partner" hidden>パートナー</button>
        </div>
        <form id="expenseForm" class="expense-form">
          <input id="expenseText" autocomplete="off" placeholder="例：セブン 240円" />
          <div class="expense-action-stack">
            <button type="submit">追加</button>
            <label class="inline-check">
              <input id="expenseFixedToggle" type="checkbox" />
              <span>固定費</span>
            </label>
          </div>
        </form>
        <div class="prediction" id="prediction">入力すると自動で分類します</div>
        <div class="expense-suggestions" id="expenseSuggestions" hidden>
          <div class="suggestion-label" id="expenseSuggestionLabel">よく使う</div>
          <div class="suggestion-list" id="expenseSuggestionList"></div>
        </div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>日別支出</h2>
          <span>直近7日</span>
        </div>
        <div class="daily-expense-list" id="dailyExpenseList"></div>
        <div class="daily-expense-summary" id="dailyExpenseSummary"></div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>カテゴリ別</h2>
          <span id="spentTotal">0円 使用</span>
        </div>
        <div class="category-list" id="categoryList"></div>
      </section>

      <section class="panel">
        <div class="section-title">
          <h2>履歴</h2>
          <button class="text-button" id="clearExpensesButton" type="button">履歴を消す</button>
        </div>
        <div class="expense-list" id="expenseList"></div>
      </section>
    </main>

    <div class="settings-backdrop" id="settingsModal" role="dialog" aria-modal="true" aria-labelledby="settingsTitle" hidden>
      <section class="settings-panel">
        <div class="settings-head">
          <h2 id="settingsTitle">設定</h2>
          <button class="icon-button" id="settingsCloseButton" type="button" aria-label="閉じる" title="閉じる">
            ×
          </button>
        </div>
        <form class="settings-form" id="settingsForm">
          <label>
            <span>自分の表示名</span>
            <input id="meDisplayName" autocomplete="off" maxlength="20" placeholder="自分" />
          </label>
          <label>
            <span>パートナーの表示名</span>
            <input id="partnerDisplayName" autocomplete="off" maxlength="20" placeholder="パートナー" />
          </label>
          <div class="settings-actions">
            <button class="text-button" id="settingsCancelButton" type="button">閉じる</button>
            <button class="save-button" type="submit">保存</button>
          </div>
        </form>
      </section>
    </div>

    <div class="settings-backdrop" id="expenseEditModal" role="dialog" aria-modal="true" aria-labelledby="expenseEditTitle" hidden>
      <section class="settings-panel">
        <div class="settings-head">
          <h2 id="expenseEditTitle">支出を編集</h2>
          <button class="icon-button" id="expenseEditCloseButton" type="button" aria-label="閉じる" title="閉じる">
            ×
          </button>
        </div>
        <form class="settings-form" id="expenseEditForm">
          <input id="editingExpenseId" type="hidden" />
          <label>
            <span>メモ</span>
            <input id="editExpenseName" autocomplete="off" placeholder="例 セブン" />
          </label>
          <label>
            <span>金額</span>
            <input id="editExpenseAmount" inputmode="numeric" pattern="[0-9]*" placeholder="例 240" />
          </label>
          <label>
            <span>カテゴリ</span>
            <select id="editExpenseCategory"></select>
          </label>
          <label>
            <span>内訳</span>
            <select id="editExpenseSubcategory"></select>
          </label>
          <label>
            <span>支払い元</span>
            <select id="editExpenseWallet">
              <option value="shared">共有財布</option>
              <option value="me">自分</option>
            </select>
          </label>
          <label class="inline-check">
            <input id="editExpenseFixedToggle" type="checkbox" />
            <span>固定費</span>
          </label>
          <div class="settings-actions">
            <button class="text-button" id="expenseEditCancelButton" type="button">閉じる</button>
            <button class="save-button" type="submit">保存</button>
          </div>
        </form>
      </section>
    </div>

    <div class="settings-backdrop" id="themeModal" role="dialog" aria-modal="true" aria-labelledby="themeTitle" hidden>
      <section class="settings-panel">
        <div class="settings-head">
          <h2 id="themeTitle">テーマカラー</h2>
          <button class="icon-button" id="themeCloseButton" type="button" aria-label="閉じる" title="閉じる">
            ×
          </button>
        </div>
        <div class="theme-grid" id="themeOptions" aria-label="テーマカラー選択"></div>
      </section>
    </div>

    <div class="settings-backdrop" id="backupModal" role="dialog" aria-modal="true" aria-labelledby="backupTitle" hidden>
      <section class="settings-panel">
        <div class="settings-head">
          <h2 id="backupTitle">バックアップ</h2>
          <button class="icon-button" id="backupCloseButton" type="button" aria-label="閉じる" title="閉じる">
            ×
          </button>
        </div>
        <div class="settings-actions">
          <button class="save-button" id="exportDataButton" type="button">データを書き出す</button>
          <button class="text-button" id="importDataButton" type="button">データを読み込む</button>
        </div>
        <input id="importDataInput" type="file" accept="application/json,.json" hidden />
      </section>
    </div>

    <div class="settings-backdrop" id="budgetModal" role="dialog" aria-modal="true" aria-labelledby="budgetTitle" hidden>
      <section class="settings-panel">
        <div class="settings-head">
          <h2 id="budgetTitle">予算設定</h2>
          <button class="icon-button" id="budgetCloseButton" type="button" aria-label="閉じる" title="閉じる">
            ×
          </button>
        </div>
        <form class="settings-form" id="budgetForm">
          <input id="editingBudgetCategory" type="hidden" />
          <label>
            <span id="budgetCategoryName">カテゴリ</span>
            <input id="categoryBudgetInput" inputmode="numeric" pattern="[0-9]*" placeholder="例 30000" />
          </label>
          <div class="settings-actions">
            <button class="text-button" id="budgetClearButton" type="button">未設定に戻す</button>
            <button class="save-button" type="submit">保存</button>
          </div>
        </form>
      </section>
    </div>

    <div class="settings-backdrop" id="fixedCostModal" role="dialog" aria-modal="true" aria-labelledby="fixedCostTitle" hidden>
      <section class="settings-panel">
        <div class="settings-head">
          <h2 id="fixedCostTitle">固定費</h2>
          <button class="icon-button" id="fixedCostCloseButton" type="button" aria-label="閉じる" title="閉じる">
            ×
          </button>
        </div>
        <p class="fixed-cost-status" id="fixedCostStatus"></p>
        <form class="settings-form" id="fixedCostForm">
          <input id="editingFixedCostId" type="hidden" />
          <label>
            <span>名称</span>
            <input id="fixedCostName" autocomplete="off" placeholder="例 家賃" />
          </label>
          <label>
            <span>金額</span>
            <input id="fixedCostAmount" inputmode="numeric" pattern="[0-9]*" placeholder="例 90000" />
          </label>
          <label>
            <span>カテゴリ</span>
            <select id="fixedCostCategory"></select>
          </label>
          <label>
            <span>内訳</span>
            <select id="fixedCostSubcategory"></select>
          </label>
          <label>
            <span>支払い元</span>
            <select id="fixedCostWallet">
              <option value="shared">共有財布</option>
              <option value="me">自分</option>
            </select>
          </label>
          <div class="settings-actions">
            <button class="text-button" id="fixedCostCancelButton" type="button">新規に戻す</button>
            <button class="save-button" type="submit">保存</button>
          </div>
        </form>
        <div class="fixed-cost-list" id="fixedCostList"></div>
      </section>
    </div>

    <template id="expenseItemTemplate">
      <article class="expense-item">
        <div>
          <strong class="expense-title"></strong>
          <span class="expense-meta"></span>
        </div>
        <div class="expense-side">
          <b class="expense-amount"></b>
          <button class="edit-button" type="button">編集</button>
          <button class="delete-button" type="button" aria-label="削除" title="削除">×</button>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
